<!DOCTYPE html>
<html lang="pt-br   ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas!</title>
    <style>
        h1{ /* box-level*/
            background-color: lightblue;
            height: 300px;
            width: 300px;
         
            border: 10px solid rgb(182, 134, 227);

            padding: 10px 10px 10px 10px;
           
            margin: 10px 10px 40px 10px;
        
            outline: 10px dashed salmon;
        }
        a{ /* inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: rgb(182, 134, 227);

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>
    
</body>
</html>
