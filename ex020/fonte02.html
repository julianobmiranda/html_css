<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love' ;
            src: url('fontes/Love Boho.otf'); format('opentype');
            font-weight: normal;
            font-style: normal;
            /*
            Tipos de Format()
            - opentype (otf)
            - truetpe (ttf)
            - embedded-opentype
            - truetype-aat (apple advanced typography)
            - svg
            
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusantium, et! Molestiae, sit unde ducimus consequuntur id nobis! Obcaecati minus vitae, dolor porro earum doloremque quae eos. Molestias nihil in omnis!</p>
    
</body>
</html>
