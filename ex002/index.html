<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragráfos</title>
</head>
<body>
    <h1>Paragráfos e quebras de linha!</h1>
    <hr>
    <p>Você pode escrever um paragráfo de qualquer jeito. Basta colocar tudo no meio do par de tags p e /p. <!-- Comentário &lt; (menor que) e &gt;(maior que)-->
    </p>
    <p>Se precisar quebrar o texto em algum lugar específico <br> como esse, você pode usar a tag br.
    </p>
    <p>Vamos adicionar alguns emoji:
    &#x1F596;
    &#x1F913;
    </p>
</body>
</html>
