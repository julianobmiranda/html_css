<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Tabela 02</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 300px;
            height: 200px;
        }

        tr.linha{
            background-color: gray;
        }

        td{
            border: 2px solid black;
            padding: 3px;
            text-align: center;
        }

    </style>
</head>
<body>
    <h1>Criação de tabela com mesclagem de células</h1>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>

        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>   
        </tr>

        <tr>
            <td colspan="3">8</td>
            <td>9</td>
        </tr>

        <tr>
            <td rowspan="2">13</td>
            <td colspan="2">15</td>
            <td>16</td>
        </tr>

        <tr>
            <td>15</td>
            <td>16</td>
            <td>16</td>
        </tr>

    </table>
    
</body>
</html>
