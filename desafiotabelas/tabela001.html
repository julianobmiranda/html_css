<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasafio Tabela 01</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
    }

    table{
        border-collapse: collapse;
        width: 300px;
        height: 200px;
    }

    tr.linha{
        background-color: gray;
    }
    
    td{
        border: 1px solid black;
        padding: 3px;
        text-align: center;
    }

    td.dado{
        background-color: yellow;
    }


    </style>
</head>
<body>
    <h1>Criação de tabela com mesclagem de células</h1>
    <table>
        <tr>
            <td colspan="4">A</td>
            <td rowspan="5">E</td>
        </tr>
         <tr>
            <td rowspan="5">F</td>
            <td>G</td>
            <td>H</td>
            <td>I</td>
            
            
        </tr>
         <tr>
            <td>L</td>
            <td>M</td>
            <td>N</td>
            
        </tr>
         <tr>
            <td>P</td>
            <td>Q</td>
            <td>R</td>
            
        </tr>
         <tr>
            <td>T</td>
            <td>U</td>
            <td>V</td>
           
        </tr>
         <tr>
            
            <td colspan="5">E</td>
        </tr>

    </table>
    
</body>
</html>
