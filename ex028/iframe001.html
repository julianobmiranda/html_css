<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de Iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um Iframe</h1>

    <p>Acessando o site do <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a> para aprender a programar</p>

<!-- Tamanho paradrão 300X150-->
    <p>Acessando o site do
        <iframe src="https://www.cursoemvideo.com" frameborde="0" scolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a>

        </iframe>
        
       para aprender a programar.
    </p>

    p>O repositório do Guanabara
        <iframe src="https://gustavoguanabara.github.io">
             <a href="https://gustavoguanabara.github.io" target="_blank">no GitHub</a>
        </iframe>
        
       também é bem legal.
    </p>
    
    
</body>
</html>
